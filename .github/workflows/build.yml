name: Build Nexus APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env
          echo "EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env
          echo "EXPO_PUBLIC_GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean

      - name: Patch Android build files for AGP 8.3+ compatibility
        run: |
          echo "=== Checking settings.gradle ==="
          cat android/settings.gradle

          # Fix 1: Ensure expo/gradle includeBuild is in settings.gradle
          if ! grep -q "expo/gradle" android/settings.gradle; then
            echo "" >> android/settings.gradle
            echo "includeBuild('../node_modules/expo/gradle')" >> android/settings.gradle
            echo "Added expo/gradle includeBuild"
          fi

          # Fix 2: Force AGP 8.1.4 in build.gradle via resolutionStrategy
          cat >> android/build.gradle << 'GRADLE_EOF'

          subprojects {
            configurations.all {
              resolutionStrategy {
                force 'com.android.tools.build:gradle:8.1.4'
              }
            }
          }
          GRADLE_EOF

          # Fix 3: Patch expo's build.gradle for AGP 8.3+ release component issue
          find node_modules/expo/android -name "build.gradle" | while read f; do
            if grep -q "components\.release" "$f"; then
              echo "Patching: $f"
              sed -i 's/from components\.release/from(components.findByName("release") ?: components.findByName("default"))/g' "$f"
            fi
          done

          # Fix 4: Patch expo-modules-core similarly
          find node_modules/expo-modules-core/android -name "build.gradle" | while read f; do
            if grep -q "components\.release" "$f"; then
              echo "Patching: $f"
              sed -i 's/from components\.release/from(components.findByName("release") ?: components.findByName("default"))/g' "$f"
            fi
          done

          echo "=== Final settings.gradle ==="
          cat android/settings.gradle

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
